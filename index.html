<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_APP_TITLE%</title>

    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="author" content="%VITE_APP_AUTHOR%" />

    <meta property="og:title" content="%VITE_APP_TITLE%" />
    <meta property="og:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="%VITE_APP_OG_IMAGE%" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="%VITE_APP_TWITTER_SITE%" />
    <meta name="twitter:image" content="%VITE_APP_OG_IMAGE%" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Theme initialization to prevent flash
      (function() {
        try {
          const savedTheme = localStorage.getItem('theme');
          if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
          } else if (savedTheme === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            // Use system preference as fallback
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
              document.documentElement.classList.add('dark');
            }
          }
        } catch (e) {
          // Silent fail
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
